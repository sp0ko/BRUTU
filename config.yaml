# ──────────────────────────────────────────────────────────────────────────────
# BruteForce Detector — konfiguracja
# ──────────────────────────────────────────────────────────────────────────────

detection:
  threshold: 5                 # number of failed logins triggering an alert
  time_window: 60              # time window (seconds)
  alert_cooldown: 300          # cooldown between alerts for the same IP (seconds)
  success_failure_threshold: 3 # min failures before a success counts as a breach
  spray_username_threshold: 8  # unique accounts from one IP = password spray alert

log_files:
  - path: /var/log/auth.log    # Debian / Ubuntu
    type: linux_ssh
    enabled: true

  # - path: /var/log/secure    # RHEL / CentOS / Fedora
  #   type: linux_ssh
  #   enabled: true

  # - path: /sciezka/do/Security.evtx   # plik Windows Event Log
  #   type: windows_evtx
  #   enabled: false

discord:
  enabled: false
  webhook_url: ""   # https://discord.com/api/webhooks/ID/TOKEN

slack:
  enabled: false
  webhook_url: ""   # https://hooks.slack.com/services/T.../B.../...

geo:
  enabled: true
  cache_ttl: 3600
  timeout: 5
  # mmdb_path: /path/to/GeoLite2-City.mmdb   # offline mode (requires: pip install geoip2)

blocker:
  enabled: false              # requires root / sudo
  auto_unblock_after: 3600    # seconds; 0 = permanent until restart
  state_file: reports/blocked_ips.json
  dry_run: false              # true = log only, no real iptables rules

whitelist:
  - "127.0.0.1"
  - "::1"
  # - "192.168.1.0/24"

reports:
  save_to_file: true
  output_path: reports/alerts.jsonl

logging:
  level: INFO
  # file: logs/detector.log
